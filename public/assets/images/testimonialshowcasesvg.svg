<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Calm abstract swirl medspa background">

  <defs>
    <!-- Base Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="50%" stop-color="#e8e0d1"/>
      <stop offset="100%" stop-color="#d9cfbe"/>
    </linearGradient>

    <!-- Soft Glow -->
    <radialGradient id="glow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Blur filters -->
    <filter id="blur80">
      <feGaussianBlur stdDeviation="80"/>
    </filter>

    <filter id="blur40">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#glow)" />

  <!-- Large Soft Swirl Layers -->
  <g opacity="0.45" filter="url(#blur80)">
    <path d="M-200 600 C 200 400, 600 800, 1000 600 C 1300 450, 1700 700, 1800 600 L1800 1000 L-200 1000 Z"
          fill="#efe7db"/>
    <path d="M-200 250 C 300 50, 900 350, 1400 200 C 1700 100, 1800 300, 1800 300 L1800 -200 L-200 -200 Z"
          fill="#ede5d9"/>
  </g>

  <!-- Flowing Swirl Accents -->
  <g opacity="0.35" filter="url(#blur40)">
    <path d="M200 700 C 500 650, 900 750, 1400 700"
          stroke="#c9bfae" stroke-width="120" fill="none" stroke-linecap="round"/>
    <path d="M300 350 C 700 300, 1100 400, 1500 350"
          stroke="#d8cebe" stroke-width="90" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Fine Elegant Swirl Lines -->
  <g opacity="0.3" stroke="#b7ab98" stroke-width="4" fill="none">
    <path d="M150 650 C 450 600, 850 700, 1450 650" />
    <path d="M250 280 C 650 230, 1050 320, 1500 260" />
    <path d="M0 500 C 400 450, 900 550, 1600 500" />
  </g>

</svg>