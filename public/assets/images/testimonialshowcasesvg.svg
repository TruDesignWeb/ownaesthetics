<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Calm medspa background">
  <defs>
    <!-- Main palette -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3eee4"/>
      <stop offset="0.45" stop-color="#e8e0d1"/>
      <stop offset="1" stop-color="#ddd3c3"/>
    </linearGradient>

    <!-- Soft glow -->
    <radialGradient id="glow" cx="30%" cy="25%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle pattern for texture -->
    <pattern id="grain" width="140" height="140" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="22" r="1.2" fill="#cfc4b2" opacity="0.18"/>
      <circle cx="64" cy="40" r="1.1" fill="#cfc4b2" opacity="0.12"/>
      <circle cx="112" cy="28" r="1.0" fill="#cfc4b2" opacity="0.14"/>
      <circle cx="92" cy="86" r="1.3" fill="#cfc4b2" opacity="0.10"/>
      <circle cx="36" cy="104" r="1.0" fill="#cfc4b2" opacity="0.14"/>
      <circle cx="122" cy="118" r="1.1" fill="#cfc4b2" opacity="0.12"/>
      <circle cx="54" cy="78" r="0.9" fill="#cfc4b2" opacity="0.10"/>
    </pattern>

    <!-- Soft blur for organic shapes -->
    <filter id="blur60" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur30" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <!-- Gentle shadow for line art -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#bfb3a1" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Organic calm blobs -->
  <g opacity="0.55" filter="url(#blur60)">
    <path d="M-90 640 C 180 470, 420 790, 690 630 C 890 510, 1080 520, 1290 640 C 1490 760, 1710 700, 1710 700 L 1710 980 L -90 980 Z"
          fill="#e8e0d1"/>
    <path d="M-120 240 C 140 40, 360 250, 620 120 C 840 10, 1030 30, 1220 170 C 1410 310, 1680 240, 1680 240 L 1680 -90 L -120 -90 Z"
          fill="#efe8db"/>
  </g>

  <g opacity="0.35" filter="url(#blur30)">
    <ellipse cx="1320" cy="250" rx="260" ry="180" fill="#f6f2ea"/>
    <ellipse cx="280" cy="720" rx="320" ry="220" fill="#f1ebdf"/>
  </g>

  <!-- Minimal line art: gentle leaf + arc (medspa vibe) -->
  <g opacity="0.35" filter="url(#softShadow)" fill="none" stroke="#b7ab98" stroke-width="3">
    <path d="M1180 585 C 1270 520, 1410 520, 1500 600" stroke-linecap="round"/>
    <path d="M1210 610 C 1310 560, 1410 575, 1485 640" stroke-linecap="round"/>
    <path d="M260 250 C 330 190, 430 190, 500 255" stroke-linecap="round"/>
    <path d="M290 275 C 360 230, 430 240, 480 295" stroke-linecap="round"/>

    <!-- simple leaf outline -->
    <path d="M820 700
             C 865 640, 950 620, 1020 650
             C 960 720, 885 750, 820 700 Z"
          stroke-linejoin="round"/>
    <path d="M845 700 C 900 675, 945 665, 995 660" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Subtle texture overlay -->
  <rect width="1600" height="900" fill="url(#grain)" opacity="0.35"/>
</svg>