<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" role="img" aria-label="Minimal beige banner with abstract phones and shapes">
  <defs>
    <!-- Base + accent palette (tweak these to taste) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9B5B3E"/>
      <stop offset="1" stop-color="#9B5B3E"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C9B6A3" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#B79B86" stop-opacity="0.35"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset in="blur" dx="0" dy="8" result="off"/>
      <feColorMatrix in="off" type="matrix"
        values="0 0 0 0 0.15
                0 0 0 0 0.12
                0 0 0 0 0.10
                0 0 0 0.20 0" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="22" r="1.2" fill="#000" opacity="0.03"/>
      <circle cx="92" cy="44" r="1.1" fill="#000" opacity="0.025"/>
      <circle cx="55" cy="88" r="1.0" fill="#000" opacity="0.02"/>
      <circle cx="30" cy="96" r="0.9" fill="#000" opacity="0.02"/>
      <circle cx="108" cy="18" r="0.9" fill="#000" opacity="0.02"/>
    </pattern>

    <style>
      .line { fill: none; stroke: #6F5E52; stroke-opacity: 0.20; stroke-width: 2; }
      .thin { stroke-width: 1.5; stroke-opacity: 0.16; }
      .shape { fill: url(#accent); }
      .mutedFill { fill: #FFFFFF; fill-opacity: 0.35; }
      .phoneFrame { fill: #FFFFFF; fill-opacity: 0.55; stroke: #6F5E52; stroke-opacity: 0.22; stroke-width: 2; }
      .phoneScreen { fill: #FFFFFF; fill-opacity: 0.35; }
      .chip { fill: #6F5E52; opacity: 0.18; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="600" fill="url(#bg)"/>
  <rect width="1600" height="600" fill="url(#grain)" opacity="0.55"/>

  <!-- Soft abstract blobs -->
  <path class="shape" d="M220,120 C330,40 470,70 520,170 C580,290 430,340 320,310 C190,275 110,200 220,120 Z" opacity="0.55"/>
  <path class="shape" d="M1240,80 C1360,30 1495,90 1515,210 C1535,330 1405,390 1290,345 C1170,300 1120,140 1240,80 Z" opacity="0.45"/>
  <path class="shape" d="M980,380 C1080,320 1210,350 1260,450 C1315,565 1125,610 1010,560 C900,512 880,430 980,380 Z" opacity="0.35"/>

  <!-- Subtle arcs -->
  <path class="line" d="M-40,420 C220,260 520,260 780,420"/>
  <path class="line thin" d="M820,210 C1030,80 1310,80 1560,220"/>
  <path class="line thin" d="M80,520 C420,430 720,460 980,560"/>

  <!-- Abstract phone 1 (left) -->
  <g transform="translate(300 165) rotate(-8)" filter="url(#softShadow)">
    <rect x="0" y="0" width="220" height="360" rx="34" class="phoneFrame"/>
    <rect x="20" y="42" width="180" height="266" rx="22" class="phoneScreen"/>
    <rect x="88" y="18" width="44" height="8" rx="4" class="chip"/>
    <circle cx="110" cy="332" r="16" class="chip"/>
    <!-- Minimal UI lines -->
    <path class="line" d="M44,86 H176"/>
    <path class="line thin" d="M44,116 H156"/>
    <path class="line thin" d="M44,146 H168"/>
    <rect x="44" y="190" width="132" height="16" rx="8" class="mutedFill"/>
    <rect x="44" y="220" width="96" height="16" rx="8" class="mutedFill"/>
    <rect x="44" y="250" width="120" height="16" rx="8" class="mutedFill"/>
  </g>

  <!-- Abstract phone 2 (right) -->
  <g transform="translate(1120 150) rotate(10)" filter="url(#softShadow)">
    <rect x="0" y="0" width="240" height="390" rx="38" class="phoneFrame"/>
    <rect x="22" y="46" width="196" height="286" rx="24" class="phoneScreen"/>
    <rect x="98" y="20" width="44" height="8" rx="4" class="chip"/>
    <circle cx="120" cy="356" r="16" class="chip"/>
    <!-- Minimal UI shapes -->
    <circle cx="70" cy="110" r="26" class="mutedFill"/>
    <rect x="110" y="92" width="86" height="14" rx="7" class="mutedFill"/>
    <rect x="110" y="116" width="64" height="14" rx="7" class="mutedFill"/>
    <rect x="48" y="180" width="170" height="18" rx="9" class="mutedFill"/>
    <rect x="48" y="212" width="130" height="18" rx="9" class="mutedFill"/>
    <rect x="48" y="244" width="150" height="18" rx="9" class="mutedFill"/>
  </g>

  <!-- Minimal floating shapes -->
  <g opacity="0.75">
    <circle cx="820" cy="140" r="10" fill="#6F5E52" opacity="0.12"/>
    <circle cx="860" cy="160" r="6" fill="#6F5E52" opacity="0.10"/>
    <circle cx="790" cy="175" r="5" fill="#6F5E52" opacity="0.10"/>
    <rect x="720" y="430" width="110" height="18" rx="9" fill="#FFFFFF" opacity="0.35"/>
    <rect x="860" y="430" width="70" height="18" rx="9" fill="#FFFFFF" opacity="0.28"/>
    <path d="M640,250 C690,220 740,220 790,250 C740,280 690,280 640,250 Z" fill="#FFFFFF" opacity="0.25"/>
  </g>

  <!-- Safe margins guide (invisible) -->
  <rect x="60" y="60" width="1480" height="480" fill="none" opacity="0"/>
</svg>